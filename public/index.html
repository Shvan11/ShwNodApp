<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Shwan Orthodontics - Practice Management</title>

    <!--
      Theme + language FOUC guard — runs BEFORE the inline <style> blocks and the
      CSS bundles, so the very first paint already has the right data-theme AND
      the right lang/dir (RTL layout never flashes LTR on reload). Both stored
      keys are written RAW by core/storage.ts (String(value), not JSON), so we
      read them back with a plain getItem and no JSON.parse. Keep in sync with
      public/js/core/theme.ts (THEME_STORAGE_KEY = 'shwan_theme') and
      public/js/core/language.ts (LANGUAGE_STORAGE_KEY = 'shwan_language').
    -->
    <script>
      (function () {
        // Theme
        var pref = 'auto';
        try { pref = localStorage.getItem('shwan_theme') || 'auto'; } catch (e) {}
        if (pref !== 'light' && pref !== 'dark' && pref !== 'auto') pref = 'light';
        var resolved = pref === 'auto'
          ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : pref;
        document.documentElement.setAttribute('data-theme', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', resolved === 'dark' ? '#11151c' : '#667eea');

        // Language — whitelist en|ar (default en), set lang always + dir pre-paint.
        // dir is RTL only when Arabic AND the current route is translated (route-
        // scoped RTL — untranslated pages stay LTR even in Arabic). Keep this route
        // check in sync with RTL_ROUTES / isRtlRoute in public/js/core/language.ts.
        var lang = 'en';
        try { lang = localStorage.getItem('shwan_language') || 'en'; } catch (e) {}
        if (lang !== 'en' && lang !== 'ar') lang = 'en';
        document.documentElement.setAttribute('lang', lang);
        var p = location.pathname;
        var rtlRoute = (p === '/' || p === '/dashboard' || p === '/expenses' || p.indexOf('/expenses/') === 0 || p === '/appointments' || /^\/patient\/[^/]+\/works\/?$/.test(p) || /^\/patient\/[^/]+\/appointments\/?$/.test(p) || /^\/patient\/[^/]+\/new-appointment\/?$/.test(p) || /^\/patient\/[^/]+\/edit-appointment(\/.*)?$/.test(p));
        document.documentElement.setAttribute('dir', (lang === 'ar' && rtlRoute) ? 'rtl' : 'ltr');

        // Arabic webfont — whitelist the font ids (default cairo), set
        // data-arabic-font pre-paint so the chosen face is used on first paint
        // (no font swap flash). The `:root[data-arabic-font]` rules in
        // css/base/fonts.css map this to --font-arabic. Keep this whitelist in
        // sync with ARABIC_FONTS in public/js/core/font.ts
        // (ARABIC_FONT_STORAGE_KEY = 'shwan_arabic_font').
        var font = 'cairo';
        try { font = localStorage.getItem('shwan_arabic_font') || 'cairo'; } catch (e) {}
        var FONTS = { 'cairo': 1, 'ibm-plex': 1, 'almarai': 1 };
        if (!FONTS[font]) font = 'cairo';
        document.documentElement.setAttribute('data-arabic-font', font);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!--
      All application + vendor CSS is imported via JS modules so Vite bundles,
      content-hashes, and code-splits it (no render-blocking third-party CDN
      <link>s here). Font Awesome → App.tsx (global); GrapesJS CSS → its lazy
      editor chunk (GrapesJSEditor.tsx); PhotoSwipe → GridComponent.
    -->

    <!-- Loading spinner animation for React.lazy() -->
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <!-- React and dependencies are bundled by Vite for optimal performance -->
    <!-- Using latest stable React 19.1.0 with full bundling (best practice 2025) -->
    <!-- No CDN imports - everything is optimized and tree-shaken in the build -->

    <!-- Global Styles -->
    <style>
        /* Note: Basic resets are handled by /css/base/reset.css */

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f8f9fa;
        }

        code {
            font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New', monospace;
        }

        /* Loading spinner */
        .spa-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }

        .spa-loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* Dark counterparts for the boot chrome — applied by the FOUC script's
           data-theme before any CSS bundle loads, so the pre-React paint
           (page bg + loading spinner) matches the chosen theme, no white flash.
           Wrapped in @media screen so print preview stays on the light boot. */
        @media screen {
            html[data-theme="dark"] body {
                background-color: #11151c;
            }

            html[data-theme="dark"] .spa-loading {
                background-color: #11151c;
            }

            html[data-theme="dark"] .spa-loading-spinner {
                border-color: #2b3344;
                border-top-color: #4dabf7;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Application container */
        #single-spa-application {
            min-height: 100vh;
        }

        /* Universal header container */
        #universal-header-root {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            min-height: 50px;
        }

        /* App container - top padding clears the fixed header. The offset is the
           responsive --header-height token (defined in css/base/tokens-primitive.css);
           full-height page shells subtract the same token from 100vh so the header
           is never counted twice → no phantom scrollbar. #app-container is React-
           rendered after window load, so variables.css is always present; the 50px
           fallback is belt-and-braces. */
        #app-container {
            padding: 0;
            margin: 0;
            padding-top: var(--header-height, 50px);
        }

        /* Smooth transitions between routes */
        .app-transition {
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error boundary styles */
        .error-boundary {
            padding: 40px;
            text-align: center;
            background-color: #fee;
            border: 2px solid #fcc;
            border-radius: 8px;
            margin: 20px;
        }

        .error-boundary h2 {
            color: #c33;
            margin-bottom: 10px;
        }

        .error-boundary p {
            color: #666;
        }

        @media screen {
            html[data-theme="dark"] .error-boundary {
                background-color: #2a1416;
                border-color: #6b2a2f;
            }

            html[data-theme="dark"] .error-boundary h2 {
                color: #ff8787;
            }

            html[data-theme="dark"] .error-boundary p {
                color: #9aa3b2;
            }
        }
    </style>
</head>
<body>
    <!-- React Application Container -->
    <!-- Unified React app with BrowserRouter will be mounted here -->
    <div id="single-spa-application">
        <!-- Initial loading state (removed after React mounts) -->
        <div class="spa-loading">
            <div class="spa-loading-spinner"></div>
        </div>
    </div>

    <!-- Portal target for <Modal> overlays. Rendered outside the React mount container -->
    <!-- so modals escape any ancestor stacking/clipping context. See Modal.tsx. -->
    <div id="modal-root"></div>

    <!-- Global Fetch Interceptor for Authentication -->
    <script>
        // Intercept all fetch requests to handle 401 authentication errors globally
        // This ensures consistent redirect behavior across all components
        (function() {
            const originalFetch = window.fetch;

            window.fetch = function(...args) {
                return originalFetch.apply(this, args)
                    .then(response => {
                        // Check for 401 Unauthorized
                        if (response.status === 401) {
                            console.warn('[Auth] 401 Unauthorized detected - redirecting to login');
                            // Redirect to login page
                            window.location.href = '/login.html';
                            // Return a rejected promise to prevent further processing
                            return Promise.reject(new Error('Authentication required'));
                        }
                        return response;
                    });
            };

            console.log('[Auth] Global fetch interceptor installed');
        })();
    </script>

    <!-- Unified React Application Bootstrap -->
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';

        console.log('[App] Initializing unified React application with Data Router');

        // Import main App component (contains RouterProvider with createBrowserRouter).
        // App itself renders the <StrictMode> wrapper — see App.tsx.
        import App from '/js/App.jsx';

        // Wait for ALL resources (including CSS) to load
        window.addEventListener('load', async () => {
            console.log('[App] All resources loaded - mounting application');

            // Clear loading spinner and prepare root element
            const appContainer = document.getElementById('single-spa-application');
            appContainer.innerHTML = '<div id="app-root"></div>';

            // Mount the unified React application with Data Router
            // App.jsx contains RouterProvider with createBrowserRouter
            // NO BrowserRouter wrapper needed - Data Router handles routing
            const root = ReactDOM.createRoot(document.getElementById('app-root'));

            try {
                root.render(React.createElement(App));

                console.log('[App] Application mounted successfully with Data Router');
            } catch (error) {
                console.error('[App] Failed to mount application:', error);

                // Show error to user
                appContainer.innerHTML = `
                    <div class="error-boundary">
                        <h2>Application Failed to Start</h2>
                        <p>Unable to initialize the application. Please refresh the page.</p>
                        <p style="color: #999; font-size: 12px; margin-top: 10px;">
                            Error: ${error.message}
                        </p>
                    </div>
                `;
            }
        });

        // Global error handler
        window.addEventListener('error', (event) => {
            console.error('[App] Global error:', event.error);
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('[App] Unhandled promise rejection:', event.reason);
        });

        // Performance monitoring
        window.addEventListener('load', () => {
            if (window.performance) {
                const perfData = window.performance.timing;
                const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
                console.log(`[App] Page load time: ${pageLoadTime}ms`);
            }
        });
    </script>

            });
        }

    -->
</body>
</html>
